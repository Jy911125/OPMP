version: '3.8'

services:
  # OPMP Backend Server
  opmp-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: opmp-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Docker socket for Docker API access
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # System info (read-only)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
      # Log directory
      - opmp-logs:/var/log/opmp
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-opmp-production-secret-change-me}
      - JWT_EXPIRES_IN=24h
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PROC_PATH=/host/proc
      - SYS_PATH=/host/sys
      - ETC_PATH=/host/etc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - opmp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # OPMP Frontend Client (Nginx)
  opmp-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: opmp-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      opmp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - opmp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  opmp-network:
    driver: bridge

volumes:
  opmp-logs:
    driver: local
