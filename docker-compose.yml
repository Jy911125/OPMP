version: '3.8'

services:
  # OPMP 后端服务
  opmp-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: opmp-server:1.0.0
    container_name: opmp-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Docker socket - 用于操作Docker API
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # 系统信息 (只读)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
      # 日志持久化
      - opmp-logs:/var/log/opmp
      # 共享node_modules (加速后续构建)
      - node-modules-cache:/app/node_modules
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-opmp-production-secret-change-me}
      - JWT_EXPIRES_IN=24h
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PROC_PATH=/host/proc
      - SYS_PATH=/host/sys
      - ETC_PATH=/host/etc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - opmp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # OPMP 前端服务 (Nginx)
  opmp-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: opmp-client:1.0.0
    container_name: opmp-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      opmp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - opmp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  opmp-network:
    driver: bridge
    name: opmp-network

volumes:
  # 日志持久化
  opmp-logs:
    driver: local
    name: opmp-logs
  # Node模块共享缓存 (多个Node项目可复用)
  node-modules-cache:
    driver: local
    name: node-modules-cache
